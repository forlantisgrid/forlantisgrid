<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Forlantis Power Solutions</title>
    <script>
      // SPA redirect for GitHub Pages — preserves the path as a query param
      // so the main index.html can restore it via history.replaceState
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.host +
          l.pathname.split('/').slice(0, 1).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
