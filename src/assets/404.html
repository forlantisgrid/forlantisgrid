<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Forlantis Power Solutions</title>
    <script>
      // GitHub Pages SPA redirect — encodes the URL and sends it to index.html
      // pathSegmentsToKeep = 0 for a custom domain at root
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
